[theme]
# Professional deep-red theme for the AI-Powered Career Guidance System.
# Chosen over a bright/pure red deliberately — bright red reads as
# "error/danger" in most UI conventions (and our own charts already use
# red for low skill ratings), so a deeper, more formal red avoids that
# clash on buttons, sliders, and the active tab underline.
primaryColor = "#B91C1C"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#FBF3F3"
textColor = "#1F2430"
font = "sans serif"
