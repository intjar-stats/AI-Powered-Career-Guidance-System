[theme]
# Colorful theme for the AI-Powered Career Guidance System, inspired by the
# reference dashboard the mentor shared. This recolors buttons, active tab
# underlines, sliders, the chat input, and metric accents app-wide — no
# custom CSS needed, so it stays stable across Streamlit versions.
primaryColor = "#6366F1"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F3F4FF"
textColor = "#1F2430"
font = "sans serif"
